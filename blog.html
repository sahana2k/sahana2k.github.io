<blockquote>"The key to artificial intelligence has always been the representation." — Jeff Hawkins</blockquote>

<p>How does ChatGPT or Gemini know what to answer when you ask:</p>

<p><strong>"What should I do?"</strong></p>

<p>It sounds simple.</p>

<p>But it's impossible to answer well without context.</p>

<h2>What Is Context?</h2>

<p>At its core, context is the background information that makes an input meaningful.<br/>
The who. The what. The where. The when. The why.</p>

<p>It's what gives shape to meaning.</p>

<p>In AI systems, context governs nearly the entire user experience. Every response you receive is shaped not just by your latest prompt — but by everything the model can "see" at that moment.</p>

<p>Technically speaking:</p>

<p><strong>Context is the combination of input and output tokens an LLM can access at any given time.</strong></p>

<p>But that definition is mechanical.</p>

<p>The real distinction is this:</p>

<p><em>Data is what is. Context is what it means.</em></p>

<p>Data exists in isolation.<br/>
Context connects it to intention.</p>

<p>In essence, context is the interpretation layer that transforms data into action.</p>

<h2>Thinking About Context in Three Tiers</h2>

<p>We can view context across three layers:</p>

<p><strong>Structural Context</strong> — definitions, relationships, hierarchies</p>

<p><strong>Operational Context</strong> — rules, procedures, decision logic</p>

<p><strong>Behavioral Context</strong> — patterns, preferences, historical lessons</p>

<p>Together, these layers shape how an AI responds.</p>

<h2>How Is Context Stored?</h2>

<p>Context in AI isn't remembered the way humans remember.</p>

<p>It is <em>represented, processed, and weighted</em> — not recalled.</p>

<h3>1. Immediate Context (Inside a Conversation)</h3>

<p>When we interact with an LLM, everything is converted into tokens.</p>

<p>For example:</p>

<p><strong>"How is context stored in AI?"</strong><br/>
might become:</p>

<p>[4021, 318, 2419, 287, 9552, 30]</p>

<p>These tokens are placed inside the model's <strong>context window</strong> — the bounded space of information it can attend to at once.</p>

<p>The model doesn't store facts.<br/>
It processes relationships.</p>

<h3>2. Long-Term Memory (Outside the Model)</h3>

<p>If an AI system supports persistence, context is stored externally.</p>

<p>Text is converted into high-dimensional embeddings and stored in a vector database.</p>

<p>This pattern is known as:</p>

<p><strong>Retrieval-Augmented Generation (RAG).</strong></p>

<p>The model itself does not remember.</p>

<p>The system retrieves relevant information and injects it back into the context window when needed.</p>

<p>Memory, in this sense, is simulated.</p>

<h2>How Does the Model Decide What Matters?</h2>

<p>The relationship between LLMs and their context window isn't just about size.</p>

<p>It's about <em>prioritization</em>.</p>

<p>LLMs use a mechanism called <strong>attention</strong>.</p>

<p>Each token:</p>

<p>• Looks at other tokens<br/>
• Assigns attention weights<br/>
• Determines relevance</p>

<p>Context is not a list of stored facts.</p>

<p>It is a <em>weighted mathematical relationship between tokens</em> — a probability distribution shaped by prior inputs.</p>

<h2>Why Do Models Still Struggle?</h2>

<p>Even with large context windows, models still show:</p>

<p>• Recency bias<br/>
• Primacy bias<br/>
• Attention dilution in dense middle regions</p>

<p>This leads to a phenomenon known as:</p>

<p><strong>Lost in the Middle</strong> — where information at the beginning and end of long prompts is prioritized, while information in the middle is often overlooked.</p>

<p>Interestingly, this mirrors human cognitive bias.</p>

<p>It's not an explicitly programmed flaw.<br/>
It's an emergent property of the architecture.</p>

<h2>How Much Context Can Be Stored?</h2>

<p>Every LLM has a defined context window limit — the maximum number of tokens it can process at once.</p>

<p>Some modern models support extremely large windows. For example, Claude Opus 4.5 supports up to one million tokens.</p>

<p>But here's the paradox:</p>

<p><strong>The more information you provide,<br/>
the worse performance can become.</strong></p>

<p>Larger windows increase complexity.<br/>
Signal gets diluted.<br/>
Attention spreads thinner.</p>

<p>Bigger context does not automatically mean better reasoning.</p>

<h2>Where This Is Going</h2>

<p>Context is not memory.<br/>
It is not a database.<br/>
It is not understanding.</p>

<p>It is <em>dynamic weighting</em> — a shifting mathematical landscape shaped by what came before.</p>

<p>And we're still learning how to engineer it well.</p>

<p>In the next post, I'll dive deeper into <strong>Lost in the Middle</strong> and explore how industry systems attempt to mitigate context degradation at scale.</p>

                    content: `
<h2>Lost in the Middle: when "more context" becomes a blind spot</h2>

<p>You've probably seen this happen in real life:</p>

<p>You paste <em>everything</em> into the prompt, the spec, the logs, the API docs, the exact error, even the answer and the model still replies with something confidently wrong.</p>

<p>It's not always "hallucination." Sometimes it's something more specific (and more frustrating):</p>

<p>The model is <strong>worst at using information that appears in the middle</strong> of a long context.</p>

<p>That pattern has a name: <strong>Lost in the Middle</strong>.</p>

<h2>What is "Lost in the Middle"?</h2>

<p><strong>Lost in the Middle</strong> is the tendency for language models to perform best when relevant information is placed at the <strong>very beginning</strong> or <strong>very end</strong> of the input and to perform significantly worse when the same information is placed <strong>somewhere in the middle</strong>.</p>

<p>A simple way to visualize it:</p>

<p>• Put the answer in the first chunk → performance is high<br/>
• Put the answer in the last chunk → performance is high<br/>
• Put the answer in the middle → performance dips</p>

<p>The result looks like a <strong>U-shaped curve</strong>, and the paper explicitly connects this to <strong>primacy bias</strong> (favoring early items) and <strong>recency bias</strong> (favoring late items).</p>

<p>For a non-technical mental model: imagine building an enormous home library. You keep buying shelves because you <em>can</em>. But when you need one specific book, you still end up scanning the first shelf, then the last shelf… and somehow missing the one you came for in the middle.</p>

<p>That's the core distinction this phenomenon exposes:</p>

<p><strong>Accepting context is not the same as using context.</strong></p>

<h2>Why does this happen at all?</h2>

<p>At first glance, it feels absurd. Why would a "supercomputer brain" care about the <em>order</em> of text? It doesn't get tired halfway through.</p>

<p>But the issue isn't fatigue, it's <strong>how these systems are trained and how they condition on inputs</strong>.</p>

<p>The <em>Lost in the Middle</em> paper tests a mix of models and settings, and then digs into three big contributors:</p>

<p><strong>1. Model architecture (decoder-only vs. encoder–decoder)</strong><br/>
<strong>2. Whether the model can "see" the query early enough (query-aware contextualization)</strong><br/>
<strong>3. Training dynamics, including instruction tuning</strong></p>

<p>Let's unpack the most intuitive part first.</p>

<h2>Decoder-only models and the "rear-view mirror" problem</h2>

<p>Most popular chat-style LLMs are <strong>decoder-only</strong> Transformers (GPT-style). A key constraint: <strong>they use causal attention</strong> — meaning tokens can attend only to <strong>earlier</strong> tokens.</p>

<p>That matters <em>a lot</em> when prompts are formatted like this:</p>

<blockquote>[Document 1] [Document 2] … [Document 20] [Question]</blockquote>

<p>In that common layout, the model processes the documents <em>before</em> it sees the question — and because of causal masking, it can't "contextualize" those earlier documents using the query tokens that appear later. The paper calls the fix <strong>query-aware contextualization</strong>, and it's exactly what it sounds like: make the query visible <em>earlier</em>.</p>

<p>So it's not that the model "forgets" in a human way. It's that the system ends up leaning on heuristics: what usually matters is near the start (instructions) and near the end (fresh tokens), and the middle becomes a danger zone.</p>

<p>The paper even links the U-shape to a classic psychology pattern: the <strong>serial-position effect</strong> — humans also tend to recall the first and last items in a list best.</p>

<h2>The experiment that made me do a double-take: "open book" got worse than "closed book"</h2>

<p>Here's the moment where <em>Lost in the Middle</em> stops being an academic curiosity and becomes a practical warning label.</p>

<p>The researchers ran a multi-document QA setup:</p>

<p>• The model gets a factual question.<br/>
• In the <strong>closed-book</strong> condition, it gets <em>no documents</em>. It must rely on its internal (parametric) knowledge.<br/>
• In the <strong>open-book</strong> condition, it gets a pile of retrieved documents, and <strong>exactly one contains the answer</strong>.</p>

<p>Now, you'd expect open-book to crush closed-book. After all, the answer is literally present.</p>

<p>But when the answer-containing document was placed <strong>in the middle</strong>, GPT‑3.5‑Turbo's performance on the open-book task dropped <strong>below its closed-book score (56.1%)</strong>.</p>

<p>In other words:</p>

<p><strong>Giving the model the answer key made it perform worse than not giving it any notes at all, because the answer key was buried in the middle.</strong></p>

<p>That's the "lost" part. It's not that the model can't answer. It's that it can't reliably <em>find and use</em> what's already in front of it.</p>

<h2>"We have bigger context windows now. Surely this is fixed?"</h2>

<p>This is where a lot of AI discourse gets lazy.</p>

<p>Yes, context windows have grown. But the paper shows something uncomfortable:</p>

<p>When the prompt fits inside both the standard and extended context window, <strong>extended-context versions often perform nearly identically</strong> to their non-extended counterparts.</p>

<p>Even more bluntly: in their evaluations, the 16K version doesn't "solve" the issue, it tends to <strong>stretch the same failure mode across a longer span</strong>.</p>

<p>The authors phrase it as: model performance can <strong>degrade as context grows</strong>, and "more room" doesn't automatically translate into "better use."</p>

<p>There's also a brutal retrieval-augmented reality check:</p>

<p>When retrieving Wikipedia passages for NaturalQuestions-Open, performance saturates long before retriever recall saturates and <strong>using 50 documents instead of 20 only marginally improves results (~1.5% for GPT‑3.5‑Turbo and ~1% for Claude‑1.3)</strong>.</p>

<p>Or in plain English:</p>

<p><strong>Adding more haystack doesn't help if the model is bad at finding needles.</strong></p>

<p>And that has real costs: more tokens means more latency and more spend, often for negligible gains.</p>

<h2>Would a different architecture help?</h2>

<p>The authors tested <strong>encoder–decoder</strong> models (Flan‑UL2 and Flan‑T5‑XXL) to see if bidirectional encoding changes the shape of the curve.</p>

<p>What they found is nuanced (and useful):</p>

<p>• Encoder–decoder models are <strong>more robust to position changes</strong> <em>when evaluated within the sequence lengths they were trained on</em> (e.g., Flan‑UL2's encoder trained up to 2048 tokens, Flan‑T5‑XXL up to 512).<br/>
• But when evaluated on <strong>longer sequences than training</strong>, even these models begin to show the same U-shaped degradation.</p>

<p>So yes: architecture can help. But it's not a magic wand. Generalizing beyond training lengths is still hard.</p>

<h2>Is instruction fine-tuning to blame?</h2>

<p>It's tempting to blame "chat tuning" and say: <em>The model learns to focus on the beginning because the instruction is always placed there.</em></p>

<p>The paper checks this directly by comparing an instruction-tuned model (MPT‑30B‑Instruct) with its base model (MPT‑30B). Result:</p>

<p><strong>Both show the U-shaped curve.</strong> Instruction tuning raises overall performance, but the positional bias trend remains.</p>

<p>So the clean takeaway is:</p>

<p>• Fine-tuning doesn't <em>create</em> the phenomenon from nothing.<br/>
• But depending on formatting conventions, it may still <strong>reinforce where "important things" usually appear</strong>.</p>

<h2>What actually helps today?</h2>

<p>The paper proposes (and tests) a set of pragmatic mitigations. Here are the ones worth operationalizing immediately:</p>

<h3>1) Put the most important stuff first</h3>

<p>If models overweight the beginning, don't fight it. <strong>Rerank documents</strong> so the most relevant passages show up early.</p>

<h3>2) Give the model less to read</h3>

<p>More context can increase the reasoning burden and dilute signal. <strong>Truncate aggressively</strong>: drop low-relevance chunks instead of maxing the window.</p>

<h3>3) Use "query-aware contextualization" (the query sandwich)</h3>

<p>Instead of putting the question only at the end, place it <strong>before and after</strong> the context.</p>

<p>This dramatically improves the synthetic key–value retrieval task: for example, GPT‑3.5‑Turbo (16K) reaches <strong>perfect performance</strong> at 300 key–value pairs with query-aware contextualization, whereas without it the model hits a low point of <strong>45.6%</strong>.</p>

<p>One important caveat: the same trick <strong>barely changes trends</strong> in the multi-document QA setting (it helps a bit in some placements, but doesn't "flatten the curve").</p>

<p>So: it's a powerful tool , but not a universal cure.</p>

<h3>4) Don't confuse "fits" with "finds"</h3>

<p>This is the bigger meta-point of the paper: the industry is obsessed with <em>capacity</em> , "can it fit a million tokens?" but evaluation should focus on <em>utilization</em> , "can it reliably retrieve and use what matters, wherever it is?"</p>

<h2>The uncomfortable question this raises</h2>

<p>If we keep racing toward longer and longer context windows without solving the utilization problem, we risk building systems that can <em>store</em> entire libraries…</p>

<p>…but still can't reliably answer a question when the crucial sentence is on page 37.</p>

<p>Or said differently:</p>

<p><strong>Are we optimizing for bigger memory, when what we actually need is better reading?</strong></p>

                                    e.currentTarget.style.borderColor = 'rgba(249, 244, 239, 0.3)';
                                    e.currentTarget.style.color = '#F9F4EF';
                                }}
                            >
                                ← Back to Home
                            </motion.a>

                            <div style={{ textAlign: 'center', maxWidth: '900px', margin: '0 auto' }}>
                                <motion.h1
                                    className="serif-bold text-cream"
                                    initial={{ opacity: 0, y: 30 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    transition={{ delay: 0.2 }}
                                    style={{ fontSize: '4.5rem', lineHeight: '1.1', marginBottom: '3rem' }}
                                >
                                    Byte sized Breakthrough
                                </motion.h1>

                                <motion.div
                                    className="body-font text-cream"
                                    initial={{ opacity: 0 }}
                                    animate={{ opacity: 1 }}
                                    transition={{ delay: 0.4 }}
                                    style={{ fontSize: '1.25rem', lineHeight: '2', opacity: 0.95 }}
                                >
                                    <p style={{ marginBottom: '2rem' }}>
                                        Technology isn't just something I build; it's something I sit with.
                                    </p>
                                    <p style={{ marginBottom: '2rem' }}>
                                        Beneath every interface is a system. Beneath every model is an assumption. Beneath every line of code is a decision.
                                    </p>
                                    <p style={{ marginBottom: '2rem' }}>
                                        This blog is where I trace those layers. As a software engineer and graduate student in computer science, I'm constantly learning about machine learning architectures, data systems, AI agents, and the invisible infrastructure that shapes how we interact with the world. But more than that, I'm learning how to <em>see</em> technology, how pieces connect, where trade-offs hide, and how ideas evolve over time.
                                    </p>
                                    <p>
                                        This isn't a documentation log. It's thinking in public, one system at a time.
                                    </p>
                                </motion.div>
                            </div>
                        </div>
                    </section>

                    {/* Blog Posts Grid */}
                    <section className="bg-cream px-6 py-24" style={{ paddingTop: '5rem', paddingBottom: '5rem' }}>
                        <div style={{ maxWidth: '80rem', margin: '0 auto' }}>
                            <div className="blog-grid">
                                {blogPosts.map((post, index) => (
                                    <motion.div
                                        key={post.id}
                                        initial={{ opacity: 0, y: 30 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: index * 0.1 }}
                                        onClick={() => !post.isPlaceholder && setSelectedPost(post)}
                                        className="body-font"
                                        style={{
                                            backgroundColor: post.isPlaceholder ? 'rgba(93, 23, 37, 0.3)' : '#5D1725',
                                            color: '#F9F4EF',
                                            borderRadius: '24px',
                                            padding: '2.5rem',
                                            cursor: post.isPlaceholder ? 'default' : 'pointer',
                                            transition: 'all 0.3s ease',
                                            border: post.isPlaceholder ? '3px dashed rgba(249, 244, 239, 0.3)' : '3px solid transparent',
                                            opacity: post.isPlaceholder ? 0.6 : 1
                                        }}
                                        onMouseEnter={(e) => {
                                            if (!post.isPlaceholder) {
                                                e.currentTarget.style.transform = 'translateY(-8px)';
                                                e.currentTarget.style.borderColor = '#FF6B4A';
                                                e.currentTarget.style.boxShadow = '0 20px 40px rgba(93, 23, 37, 0.3)';
                                            }
                                        }}
                                        onMouseLeave={(e) => {
                                            if (!post.isPlaceholder) {
                                                e.currentTarget.style.transform = 'translateY(0)';
                                                e.currentTarget.style.borderColor = 'transparent';
                                                e.currentTarget.style.boxShadow = 'none';
                                            }
                                        }}
                                    >
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1.5rem' }}>
                                            <span style={{ 
                                                fontSize: '0.875rem', 
                                                opacity: 0.8,
                                                backgroundColor: 'rgba(255, 107, 74, 0.2)',
                                                padding: '0.25rem 0.75rem',
                                                borderRadius: '12px'
                                            }}>
                                                {post.date}
                                            </span>
                                            <span style={{ fontSize: '0.875rem', opacity: 0.7 }}>
                                                {post.readTime}
                                            </span>
                                        </div>

                                        <h3 className="serif-bold" style={{ fontSize: '1.75rem', marginBottom: '1.5rem', lineHeight: '1.3' }}>
                                            {post.title}
                                        </h3>

                                        <p style={{ fontSize: '1rem', lineHeight: '1.75', opacity: 0.9, marginBottom: '2rem' }}>
                                            {post.preview}
                                        </p>

                                        {!post.isPlaceholder && (
                                            <div style={{ 
                                                display: 'inline-flex',
                                                alignItems: 'center',
                                                gap: '0.5rem',
                                                fontSize: '0.95rem',
                                                fontWeight: '600',
                                                color: '#FF6B4A',
                                                transition: 'gap 0.3s ease'
                                            }}
                                            onMouseEnter={(e) => e.currentTarget.style.gap = '0.75rem'}
                                            onMouseLeave={(e) => e.currentTarget.style.gap = '0.5rem'}
                                            >
                                                Read Full Post →
                                            </div>
                                        )}
                                    </motion.div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Modal for Full Post */}
                    <AnimatePresence>
                        {selectedPost && !selectedPost.isPlaceholder && (
                            <motion.div
                                className="modal-overlay"
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                onClick={() => setSelectedPost(null)}
                            >
                                <motion.div
                                    className="modal-content"
                                    initial={{ scale: 0.9, opacity: 0 }}
                                    animate={{ scale: 1, opacity: 1 }}
                                    exit={{ scale: 0.9, opacity: 0 }}
                                    onClick={(e) => e.stopPropagation()}
                                >
                                    <button 
                                        className="modal-close"
                                        onClick={() => setSelectedPost(null)}
                                        aria-label="Close"
                                    >
                                        ×
                                    </button>

                                    <div style={{ marginBottom: '1rem', display: 'flex', gap: '1rem', alignItems: 'center', flexWrap: 'wrap' }}>
                                        <span style={{ 
                                            fontSize: '0.875rem',
                                            color: '#5D1725',
                                            backgroundColor: 'rgba(255, 107, 74, 0.2)',
                                            padding: '0.35rem 0.85rem',
                                            borderRadius: '12px',
                                            fontWeight: '600'
                                        }}>
                                            {selectedPost.date}
                                        </span>
                                        <span style={{ fontSize: '0.875rem', color: '#5D1725', opacity: 0.7 }}>
                                            {selectedPost.readTime}
                                        </span>
                                    </div>

                                    <h1 className="serif-bold" style={{ 
                                        fontSize: '2.5rem', 
                                        color: '#5D1725', 
                                        marginBottom: '2rem',
                                        lineHeight: '1.2'
                                    }}>
                                        {selectedPost.title}
                                    </h1>

                                    <div 
                                        className="blog-content"
                                        dangerouslySetInnerHTML={{ __html: selectedPost.content }}
                                    />
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* Footer */}
                    <section className="bg-maroon px-6 py-12">
                        <div style={{ maxWidth: '80rem', margin: '0 auto', textAlign: 'center' }}>
                            <p className="body-font text-cream" style={{ opacity: 0.8 }}>
                                © 2026 Sahana Jayasimha Holkal
                            </p>
                            <div style={{ marginTop: '1rem', display: 'flex', justifyContent: 'center', gap: '1.5rem', flexWrap: 'wrap' }}>
                                <a href="https://www.linkedin.com/in/sahanahj" target="_blank" rel="noopener noreferrer" className="body-font text-cream" style={{ textDecoration: 'none', opacity: 0.8, transition: 'opacity 0.3s' }} onMouseEnter={(e) => e.target.style.opacity = '1'} onMouseLeave={(e) => e.target.style.opacity = '0.8'}>
                                    LinkedIn
                                </a>
                                <a href="https://github.com/sahana2k" target="_blank" rel="noopener noreferrer" className="body-font text-cream" style={{ textDecoration: 'none', opacity: 0.8, transition: 'opacity 0.3s' }} onMouseEnter={(e) => e.target.style.opacity = '1'} onMouseLeave={(e) => e.target.style.opacity = '0.8'}>
                                    GitHub
                                </a>
                                <a href="mailto:sahanahj21@gmail.com" className="body-font text-cream" style={{ textDecoration: 'none', opacity: 0.8, transition: 'opacity 0.3s' }} onMouseEnter={(e) => e.target.style.opacity = '1'} onMouseLeave={(e) => e.target.style.opacity = '0.8'}>
                                    Email
                                </a>
                            </div>
                        </div>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BlogPage />);
    </script>
</body>
</html>
